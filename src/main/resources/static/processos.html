<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>JurisDoc - Processos</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-glow"></div>

<div class="container">

    <header class="topbar">

        <div class="logo">

            ⚖️ JurisDoc

        </div>

        <div class="profile">
            <a class="btn small" href="index.html">Voltar</a>
        </div>

    </header>

    <section class="hero">

        <div class="hero-left">

            <h1>
                Sistema Jurídico Inteligente
            </h1>

            <!-- subtítulo removido conforme solicitado -->

        </div>

        <div class="hero-right">

            <div class="stats-card">

                <span>Total de Processos</span>

                <h2 id="quantidadeProcessos">
                    0
                </h2>

            </div>

        </div>

    </section>

    <section class="create-process card">

        <h2>Novo Processo</h2>

        <div class="form-grid">

            <input
                    type="text"
                    id="numeroProcesso"
                    placeholder="Número do processo"
            >

            <input
                    type="text"
                    id="cliente"
                    placeholder="Cliente"
            >

        </div>

        <textarea
                id="descricao"
                placeholder="Descrição do processo"
        ></textarea>

        <button type="button" onclick="criarProcesso()">
            Criar Processo
        </button>

    </section>

    <section id="processos">

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
